name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: dist freshness (committed dist/ must match src/)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/ is stale — run 'npm run build' and commit dist/"
            exit 1
          fi
      - run: npm test

  windows-smoke:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Set up smoke fixture
        run: node scripts/ci-smoke-setup.mjs
      - name: Round-trip via PowerShell
        shell: pwsh
        run: |
          $config = Join-Path $env:RUNNER_TEMP "smoke-config/.claude"
          $out = node dist/cli.js export --scope all --storage project --format dir --name "smoke export pwsh" --source-config-dir "$config" --project-path "/Users/testuser/Projects/testproject" --no-summary
          $result = $out | ConvertFrom-Json
          if (-not $result.success) { Write-Error "export failed: $out"; exit 1 }
          $target = Join-Path $env:RUNNER_TEMP "smoke-target-pwsh"
          $targetConfig = Join-Path $env:RUNNER_TEMP "smoke-config-pwsh/.claude"
          $out2 = node dist/cli.js import --from "$($result.exportPath)" --target-project-path "$target" --target-config-dir "$targetConfig"
          $import = $out2 | ConvertFrom-Json
          if (-not $import.success) { Write-Error "import failed: $out2"; exit 1 }
          if ($import.importedSessions.Count -ne 1) { Write-Error "expected 1 imported session: $out2"; exit 1 }
      - name: Round-trip via Git Bash
        shell: bash
        run: |
          set -euo pipefail
          config="$RUNNER_TEMP/smoke-config/.claude"
          out=$(node dist/cli.js export --scope all --storage project --format dir --name "smoke export bash" --source-config-dir "$config" --project-path "/Users/testuser/Projects/testproject" --no-summary)
          echo "$out" | jq -e '.success == true' >/dev/null
          export_path=$(echo "$out" | jq -r '.exportPath')
          out2=$(node dist/cli.js import --from "$export_path" --target-project-path "$RUNNER_TEMP/smoke-target-bash" --target-config-dir "$RUNNER_TEMP/smoke-config-bash/.claude")
          echo "$out2" | jq -e '.success == true' >/dev/null
          echo "$out2" | jq -e '.importedSessions | length == 1' >/dev/null
