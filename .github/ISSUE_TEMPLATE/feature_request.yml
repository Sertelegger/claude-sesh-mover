name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check [ROADMAP.md](https://github.com/Sertelegger/claude-sesh-mover/blob/main/ROADMAP.md) — your idea may already be planned, in which case a 👍 or comment on the roadmap direction is even more useful.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that doesn't work (or is awkward) today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? CLI flags, slash command behavior, config options — whatever fits.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you're using now, or other designs you thought about.
